services:
  db:
    image: postgres:15
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "123123"
      POSTGRES_DB: printing_db
    ports:
      - "5433:5432"  # Using 5433 to avoid your local Postgres conflict
    volumes:
      - postgres_data:/var/lib/postgresql/data

  printing-backend:
    build: .
    container_name: printing_backend_container
    ports:
      - "8081:8081" # Keep this as is since your Spring app wants 8081
    environment:
      # Note: Port 5432 is used here because inside the Docker network, 
      # the DB is still listening on its default 5432.
      DATABASE_URL: postgres://postgres:123123@db:5432/printing_db
    depends_on:
      - db

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin_container
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@printshop.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "8888:80"  # Moved to 8888 to stay out of the way of your App
    depends_on:
      - db

volumes:
  postgres_data: