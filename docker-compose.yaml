services:
  db:
    image: postgres:15
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123
      POSTGRES_DB: printing_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  printing-backend:
    build: .
    container_name: printing_backend
    ports:
      - "8081:8081"
    environment:
      # We use 'db' because that is the service name above
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/printing_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 123
      PORT: 8081
    depends_on:
      db:
        condition: service_healthy