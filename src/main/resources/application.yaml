spring:
  datasource:
    # 1. Tries Render Environment Variable
    # 2. Falls back to Docker Compose 'db' hostname
    # 3. Falls back to localhost
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://db:5432/printing_db}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:123}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: ${PORT:8081}