server:
  port: 8081

spring:
  application:
    name: printing-shop

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/neondb}
    username: ${DB_USERNAME:neondb_owner}
    password: ${DB_PASSWORD:npg_8YCOvDXybks2}
    driver-class-name: org.postgresql.Driver
    # Add these Hikari settings to keep the cloud connection alive
    hikari:
      keepalive-time: 30000
      max-lifetime: 600000
      idle-timeout: 60000
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        # This fixes the HHH000342 warning from your logs
        boot:
          allow_jdbc_metadata_access: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

logging:
  level:
    org.hibernate.SQL: DEBUG
