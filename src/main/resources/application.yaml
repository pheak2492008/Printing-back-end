spring:
  application:
    name: Printing
  
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/printing_db}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:123123}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

# Add this section to fix the "BeanCreationException"
cloudinary:
  cloud-name: ${CLOUDINARY_NAME:default}
  api-key: ${CLOUDINARY_KEY:default}
  api-secret: ${CLOUDINARY_SECRET:default}

server:
  port: ${PORT:8082}